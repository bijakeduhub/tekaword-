<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="description" content="TEKAWORD – Bilingual 5-letter word game by MY Edu Hub">
<meta property="og:title"       content="TEKAWORD • MY Edu Hub">
<meta property="og:description" content="Guess the 5-letter word in 6 tries! English & Malay.">
<meta name="theme-color" content="#1B2B6B">
<title>TEKAWORD • MY Edu Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
<!-- Firebase compat SDK (works with regular scripts, no type=module needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
/* ── kid.css variables ──────────────────────────────────── */
:root{
  --bg-grad:     linear-gradient(150deg,#0D1B4B,#1B2B6B,#243580);
  --bg-card:     rgba(255,255,255,.97);
  --bg-solid:    #ffffff;
  --bg-chip:     #f0f2ff;
  --bg-topbar:   rgba(13,27,75,.93);
  --txt:         #1B2B6B;
  --txt2:        #555;
  --txt-m:       #888;
  --txt-dk:      #fff;
  --gold:        #C9963A;
  --gold-b:      #E8B84B;
  --border:      #e0e0e0;
  --sh-card:     0 20px 40px rgba(0,0,0,.2);
  --sh-sm:       0 4px 14px rgba(0,0,0,.1);
  --sh-top:      0 2px 12px rgba(0,0,0,.25);
  --ok:          #28a745;
  --err:         #e74c3c;
  --corr:        #1565C0; --corr-d:#0D47A1;   /* 🟦 blue  */
  --pres:        #E65100; --pres-d:#BF360C;   /* 🟧 orange */
  --abs:         #37474F; --abs-d: #263238;   /* ⬛ dark   */
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
  user-select:none;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',Roboto,sans-serif;background:var(--bg-grad);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;}
button{font-family:inherit;cursor:pointer;}

/* ── TOPBAR ─────────────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:100;width:100%;
  background:var(--bg-topbar);backdrop-filter:blur(12px);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.1);box-shadow:var(--sh-top);min-height:56px;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-cap{font-size:2rem;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));flex-shrink:0;}
.tb-brand{font-family:'Poppins',sans-serif;font-weight:800;
  font-size:.92rem;color:var(--txt-dk);line-height:1.2;}
.tb-tag{display:block;font-size:.54rem;font-weight:600;
  color:var(--gold-b);letter-spacing:.5px;font-style:italic;margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:6px;}
.tb-btn{background:rgba(255,255,255,.12);border:none;border-radius:50%;
  width:34px;height:34px;font-size:1rem;color:white;
  display:flex;align-items:center;justify-content:center;transition:background .2s;}
.tb-btn:hover{background:rgba(255,255,255,.24);}

/* ── TOAST ──────────────────────────────────────────────── */
.toast-wrap{position:fixed;top:62px;left:50%;transform:translateX(-50%);
  z-index:500;display:flex;flex-direction:column;
  align-items:center;gap:6px;pointer-events:none;width:340px;}
.twt{background:#1B2B6B;color:white;padding:9px 20px;border-radius:22px;
  font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:800;
  text-align:center;max-width:100%;animation:twIn .18s ease forwards;box-shadow:var(--sh-sm);}
.twt.err{background:var(--err);}
.twt.ok {background:var(--ok);}
@keyframes twIn {from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes twOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}

/* ── GAME WRAP ──────────────────────────────────────────── */
.game-wrap{width:100%;max-width:480px;padding:14px 16px 28px;
  display:flex;flex-direction:column;align-items:center;gap:11px;}

/* ── TITLE ──────────────────────────────────────────────── */
.g-title{text-align:center;}
.g-title h1{font-family:'Poppins',sans-serif;font-weight:900;
  font-size:2.8rem;letter-spacing:5px;line-height:1;color:white;
  text-shadow:0 2px 12px rgba(0,0,0,.3),0 0 28px rgba(232,184,75,.22);}
.g-title .sub{font-size:.72rem;color:rgba(255,255,255,.65);margin-top:3px;}

/* ── MINI STATS ─────────────────────────────────────────── */
.stats-bar{display:flex;background:var(--bg-card);border-radius:16px;
  padding:10px 6px;box-shadow:var(--sh-sm);width:100%;}
.stat{flex:1;text-align:center;}
.stat+.stat{border-left:1px solid var(--border);}
.stat-val{font-family:'Poppins',sans-serif;font-weight:900;
  font-size:1.5rem;color:var(--txt);line-height:1;}
.stat-lbl{font-size:.58rem;font-weight:700;color:var(--txt-m);
  text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}

/* ── LANG TOGGLE ────────────────────────────────────────── */
.lang-toggle{display:flex;background:rgba(255,255,255,.13);backdrop-filter:blur(6px);
  border-radius:50px;padding:4px;gap:4px;border:1px solid rgba(255,255,255,.2);}
.lang-btn{background:transparent;border:none;padding:7px 20px;border-radius:44px;
  font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:800;
  color:rgba(255,255,255,.7);transition:all .2s;}
.lang-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-b));
  color:white;box-shadow:0 2px 8px rgba(201,150,58,.4);}

/* ── MODE TOGGLE ────────────────────────────────────────── */
.mode-toggle{
  display:flex;background:rgba(255,255,255,.13);backdrop-filter:blur(6px);
  border-radius:50px;padding:4px;gap:4px;border:1px solid rgba(255,255,255,.2);
}
.mode-btn{
  background:transparent;border:none;padding:7px 20px;border-radius:44px;
  font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:800;
  color:rgba(255,255,255,.7);transition:all .2s;cursor:pointer;
}
.mode-btn.active{
  background:linear-gradient(135deg,#1565C0,#0D47A1);
  color:white;box-shadow:0 2px 8px rgba(21,101,192,.5);
}
.mode-btn.active.practice{
  background:linear-gradient(135deg,#28a745,#1e7e34);
  box-shadow:0 2px 8px rgba(40,167,69,.5);
}
.grid{display:flex;flex-direction:column;gap:6px;perspective:600px;}
.row {display:flex;gap:6px;justify-content:center;}
.tile{width:58px;height:58px;background:rgba(255,255,255,.85);
  border:2px solid rgba(255,255,255,.3);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Poppins',sans-serif;font-weight:900;
  font-size:1.9rem;color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.12);}
.tile.filled {background:#fff;border-color:var(--txt);animation:tilePop .12s ease;}
.tile.correct{background:var(--corr);border-color:var(--corr);color:white;}
.tile.present{background:var(--pres);border-color:var(--pres);color:white;}
.tile.absent {background:var(--abs); border-color:var(--abs); color:white;}

/* ── ANIMATIONS ─────────────────────────────────────────── */
@keyframes tilePop{0%{transform:scale(.9)}70%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes rowShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}
  40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes tileB{0%,100%{transform:translateY(0) scale(1)}45%{transform:translateY(-18px) scale(1.06)}}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.row.shake  {animation:rowShake .38s ease;}
.tile.bounce{animation:tileB .5s ease;}

/* ── LEGEND ─────────────────────────────────────────────── */
.legend{display:flex;gap:12px;font-size:.66rem;color:rgba(255,255,255,.78);
  flex-wrap:wrap;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot {width:13px;height:13px;border-radius:3px;flex-shrink:0;}

/* ── KEYBOARD ───────────────────────────────────────────── */
.keyboard{display:flex;flex-direction:column;gap:6px;width:100%;}
.key-row {display:flex;justify-content:center;gap:5px;}
.key{
  background:var(--bg-card);border:1.5px solid var(--border);color:var(--txt);
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.84rem;
  height:46px;min-width:30px;flex:1;max-width:40px;
  border-radius:10px;
  text-transform:uppercase;transition:background .1s,transform .08s;
  box-shadow:0 3px 0 rgba(0,0,0,.18);
  display:flex;align-items:center;justify-content:center;
  /* Touch-friendly: prevent text selection & callout on long-press */
  -webkit-touch-callout:none;
  touch-action:manipulation;
  cursor:pointer;
}
.key:active  {transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.15);}
.key.wide    {min-width:44px;max-width:54px;font-size:.72rem;flex:1.4;}
.key.correct {background:var(--corr);border-color:var(--corr);color:white;box-shadow:0 3px 0 var(--corr-d);}
.key.present {background:var(--pres);border-color:var(--pres);color:white;box-shadow:0 3px 0 var(--pres-d);}
.key.absent  {background:var(--abs); border-color:var(--abs); color:white;box-shadow:0 3px 0 var(--abs-d);}

/* ── MOBILE INPUT BAR ───────────────────────────────────── */
/* Replaces ghost input — visible and 100% reliable on Android */
/* ── ACHIEVEMENT CARD (Challenge already played) ────────── */
.ach-card{
  width:100%;background:rgba(255,255,255,.12);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);
  border-radius:20px;padding:18px 20px;text-align:center;
  animation:slideUp .35s ease;
}
.ach-done{
  font-family:'Poppins',sans-serif;font-weight:900;
  font-size:1rem;color:white;margin-bottom:4px;
}
.ach-sub{
  font-size:.72rem;color:rgba(255,255,255,.65);margin-bottom:14px;
}
.ach-grid{
  font-family:'Courier New',monospace;font-size:1.4rem;
  line-height:1.8;letter-spacing:2px;margin-bottom:12px;color:white;
}
.ach-score{
  font-family:'Poppins',sans-serif;font-weight:900;
  font-size:1.3rem;color:var(--gold-b);margin-bottom:4px;
}
.ach-personal{
  font-size:.78rem;color:rgba(255,255,255,.8);font-style:italic;
  margin-bottom:14px;
}
.btn-practice{
  background:linear-gradient(135deg,#28a745,#1e7e34);
  color:white;border:none;padding:11px 24px;border-radius:28px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;
  box-shadow:0 4px 0 #155724;transition:all .12s;cursor:pointer;
}
.btn-practice:active{transform:translateY(2px);box-shadow:0 2px 0 #155724;}

/* ── SHARE MODAL — image + 2 buttons ───────────────────── */
.share-img-wrap{
  width:100%;display:flex;justify-content:center;
  margin-bottom:16px;
}
#shareCanvas{
  width:280px;height:280px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.25);
  background:#1B2B6B;
}
.share-btn-row{
  display:flex;gap:10px;
}
.share-btn-row .m-btn{
  flex:1;padding:14px 12px;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;gap:6px;
}

/* ── BUTTONS ────────────────────────────────────────────── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-b));
  color:white;border:none;padding:12px 22px;border-radius:28px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;
  box-shadow:0 4px 0 #9a6a1f;transition:all .12s;}
.btn-gold:active{transform:translateY(2px);box-shadow:0 2px 0 #9a6a1f;}
.btn-gold:disabled{background:rgba(255,255,255,.18)!important;
  box-shadow:0 4px 0 rgba(0,0,0,.15)!important;cursor:not-allowed;opacity:.9;}
.btn-ghost{background:rgba(255,255,255,.15);color:white;
  border:1.5px solid rgba(255,255,255,.25);padding:12px 18px;border-radius:28px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;
  backdrop-filter:blur(4px);transition:all .12s;}
.btn-ghost:hover {background:rgba(255,255,255,.25);}
.btn-ghost:active{transform:translateY(2px);}
.btn-share{background:linear-gradient(135deg,#1B2B6B,#243580);
  color:white;border:none;padding:12px 22px;border-radius:28px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;
  box-shadow:0 4px 0 #0a1535;transition:all .12s;animation:slideUp .35s ease;}
.btn-share:active{transform:translateY(2px);box-shadow:0 2px 0 #0a1535;}

#shareRow{display:none;width:100%;justify-content:center;}
#shareRow.show{display:flex;}

/* ── COOLDOWN BANNER ────────────────────────────────────── */
.cd-banner{display:none;width:100%;background:rgba(255,255,255,.1);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);
  border-radius:20px;padding:14px 20px;text-align:center;animation:slideUp .35s ease;}
.cd-banner.show{display:block;}
.cd-emoji{font-size:1.8rem;margin-bottom:4px;}
.cd-title{font-family:'Poppins',sans-serif;font-weight:800;font-size:.95rem;
  color:white;margin-bottom:2px;}
.cd-timer{font-family:'Poppins',sans-serif;font-weight:900;font-size:2.4rem;
  color:var(--gold-b);letter-spacing:2px;line-height:1;margin:4px 0;}
.cd-sub{font-size:.68rem;color:rgba(255,255,255,.6);font-style:italic;}

/* ── SPINNER ────────────────────────────────────────────── */
.spin{display:inline-block;width:12px;height:12px;border-radius:50%;
  border:2px solid rgba(255,255,255,.35);border-top-color:white;
  animation:sp .8s linear infinite;vertical-align:middle;margin-left:5px;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── FOOTER ─────────────────────────────────────────────── */
.footer{font-size:.62rem;color:rgba(255,255,255,.38);text-align:center;line-height:1.7;}

/* ══ MODALS ═══════════════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;
  z-index:2000;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg-solid);border-radius:28px;padding:0;
  width:100%;max-width:420px;max-height:90vh;overflow-y:auto;
  box-shadow:var(--sh-card);position:relative;
  animation:popIn .25s cubic-bezier(.175,.885,.32,1.275);}
.m-hdr{display:flex;align-items:center;justify-content:space-between;padding:22px 22px 0;}
.m-title{font-family:'Poppins',sans-serif;font-weight:900;font-size:1.15rem;color:var(--txt);}
.m-close{background:#f0f2ff;border:none;width:30px;height:30px;border-radius:50%;
  font-size:.9rem;font-weight:900;color:var(--txt-m);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.m-close:hover{background:#e0e4ff;}
.m-body{padding:18px 22px 24px;}
.m-btn-row{display:flex;gap:10px;margin-top:18px;}
.m-btn{flex:1;padding:13px;border:none;border-radius:18px;
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:900;transition:all .12s;}
.m-btn.primary{background:linear-gradient(135deg,#1B2B6B,#243580);color:white;}
.m-btn.primary:hover{opacity:.88;}
.m-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-b));
  color:white;box-shadow:0 3px 0 #9a6a1f;}
.m-btn.gold:active{transform:translateY(2px);box-shadow:none;}

/* ── HOW-TO ─────────────────────────────────────────────── */
.how-desc{font-size:.82rem;color:#444;line-height:1.6;margin-bottom:12px;}
.how-desc strong{font-weight:800;color:var(--txt);}
.how-row {display:flex;gap:4px;margin:8px 0 5px;}
.how-row .tile{width:40px;height:40px;font-size:1.1rem;border-radius:8px;flex-shrink:0;}
.how-rule{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;}
.how-rule-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0;margin-top:3px;}
.how-rule-text{font-size:.82rem;color:#444;line-height:1.5;}
.how-rule-text b.g{color:var(--corr);font-weight:900;}   /* 🟦 blue  */
.how-rule-text b.y{color:var(--pres);font-weight:900;}   /* 🟧 orange */
.how-rule-text b.a{color:var(--abs); font-weight:900;}
.how-div{border:none;border-top:1px solid var(--border);margin:14px 0;}

.mode-section{margin-bottom:8px;}
.mode-section-title{
  font-family:'Poppins',sans-serif;font-weight:900;font-size:.85rem;
  color:var(--txt);margin-bottom:10px;padding:6px 10px;
  background:var(--bg-chip);border-radius:10px;display:inline-block;
}
.mode-divider{height:1px;background:var(--border);margin:14px 0;}

/* Mode toggle inside stats modal */
.st-mode-tabs{
  display:flex;background:var(--bg-chip);border-radius:12px;
  padding:4px;gap:4px;margin-bottom:16px;
}
.st-mode-btn{
  flex:1;padding:8px 0;border:none;border-radius:9px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;
  color:var(--txt-m);background:transparent;cursor:pointer;transition:all .2s;
}
.st-mode-btn.active{
  background:white;color:var(--txt);box-shadow:0 2px 6px rgba(0,0,0,.1);
}

/* ── STATS MODAL ────────────────────────────────────────── */
.st-tabs{display:flex;background:var(--bg-chip);border-radius:12px;padding:4px;gap:4px;margin-bottom:16px;}
.st-tab{flex:1;padding:7px 0;border:none;border-radius:9px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;
  color:var(--txt-m);background:transparent;transition:all .2s;}
.st-tab.active{background:white;color:var(--txt);box-shadow:0 2px 6px rgba(0,0,0,.1);}
.sm-stats{display:flex;background:var(--bg-chip);border-radius:16px;padding:14px 8px;margin-bottom:20px;}
.sm-s{flex:1;text-align:center;}
.sm-s+.sm-s{border-left:1px solid var(--border);}
.sm-v{font-family:'Poppins',sans-serif;font-weight:900;font-size:2rem;color:var(--txt);line-height:1;}
.sm-l{font-size:.6rem;font-weight:700;color:var(--txt-m);text-transform:uppercase;letter-spacing:.6px;margin-top:3px;}
.dist-ttl{font-family:'Poppins',sans-serif;font-weight:800;font-size:.78rem;
  color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.dist-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.dist-n{width:16px;font-family:'Poppins',sans-serif;font-weight:900;
  font-size:.85rem;color:var(--txt);text-align:right;flex-shrink:0;}
.dist-track{flex:1;background:#eef0fb;border-radius:5px;height:28px;overflow:hidden;}
.dist-bar{height:100%;background:var(--abs);border-radius:5px;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:7px;min-width:28px;transition:width .5s cubic-bezier(.25,.8,.25,1);}
.dist-bar.bw {background:var(--corr);}
.dist-bar.bc {background:var(--gold);}
.dist-bar.bl {background:var(--err);}
.dist-ct{font-family:'Poppins',sans-serif;font-weight:900;font-size:.76rem;color:white;}
.no-game{text-align:center;padding:20px;font-size:.85rem;color:var(--txt-m);font-style:italic;}
.lg-card{background:var(--bg-chip);border-radius:14px;padding:12px 16px;margin-top:16px;text-align:center;}
.lg-lbl {font-size:.65rem;font-weight:800;color:var(--txt-m);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.lg-res {font-family:'Poppins',sans-serif;font-weight:800;font-size:.95rem;}
.lg-res.won {color:var(--ok);}
.lg-res.lost{color:var(--err);}
.lg-ans {font-family:'Poppins',sans-serif;font-weight:900;font-size:1.4rem;
  letter-spacing:4px;color:var(--txt);margin-top:4px;}
.emoji-prev{background:#f8f9ff;border:1.5px solid var(--border);border-radius:14px;
  padding:12px 16px;margin-top:10px;font-family:'Courier New',monospace;
  font-size:.82rem;color:var(--txt);line-height:1.7;white-space:pre;text-align:center;}

/* ── NAME ENTRY MODAL ───────────────────────────────────── */
.name-overlay{
  position:fixed;inset:0;z-index:3000;
  background:linear-gradient(150deg,rgba(13,27,75,.97),rgba(27,43,107,.97));
  backdrop-filter:blur(16px);
  /* Scrollable so button stays reachable when mobile keyboard appears */
  overflow-y:auto;
  display:flex;align-items:flex-start;justify-content:center;
  padding:32px 24px 40px;
}
.name-overlay.hidden{display:none;}

.name-card{
  background:white;border-radius:32px;
  width:100%;max-width:360px;
  box-shadow:0 24px 60px rgba(0,0,0,.35);
  animation:popIn .35s cubic-bezier(.175,.885,.32,1.275);
  overflow:hidden;flex-shrink:0;
}
.name-hero{
  background:linear-gradient(135deg,#1B2B6B,#243580);
  padding:24px 24px 18px;text-align:center;
}
.name-cap{font-size:3rem;line-height:1;margin-bottom:6px;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.3));display:block;}
.name-brand{font-family:'Poppins',sans-serif;font-weight:900;font-size:1rem;
  color:white;letter-spacing:.5px;}
.name-tagline{font-family:'Nunito',sans-serif;font-size:.65rem;font-weight:600;
  color:var(--gold-b);font-style:italic;margin-top:2px;letter-spacing:.4px;}

.name-body{padding:22px 20px 24px;}
.name-welcome{font-family:'Poppins',sans-serif;font-weight:900;font-size:1.3rem;
  color:var(--txt);text-align:center;margin-bottom:4px;}
.name-hint{font-size:.78rem;color:var(--txt-m);text-align:center;
  margin-bottom:18px;line-height:1.5;}

.name-input-wrap{position:relative;margin-bottom:8px;}
.name-input{
  width:100%;padding:13px 16px 13px 44px;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;
  color:var(--txt);
  background:#f8f9ff;border:2px solid var(--border);border-radius:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;
  user-select:auto;-webkit-user-select:auto;
}
.name-input:focus{border-color:#93C5FD;box-shadow:0 0 0 3px rgba(147,197,253,.25);}
.name-input::placeholder{color:#bbb;font-weight:600;}
.name-input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:1.05rem;pointer-events:none;}
.name-err{font-size:.72rem;color:var(--err);font-weight:700;
  min-height:18px;margin-bottom:8px;text-align:center;display:block;}

.name-btn{
  width:100%;padding:14px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--gold),var(--gold-b));
  color:white;font-family:'Poppins',sans-serif;font-weight:900;font-size:1rem;
  box-shadow:0 4px 0 #9a6a1f;transition:all .12s;cursor:pointer;letter-spacing:.3px;
  /* Explicit pointer-events in case anything overrides */
  pointer-events:auto;
}
.name-btn:hover{opacity:.92;}
.name-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #9a6a1f;}

.name-footer{font-size:.6rem;color:var(--txt-m);text-align:center;margin-top:12px;}

/* Player chip in topbar */
.tb-player{
  display:none;align-items:center;gap:5px;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);
  border-radius:20px;padding:4px 10px 4px 6px;max-width:130px;overflow:hidden;
  cursor:pointer;transition:background .2s;
}
.tb-player:hover{ background:rgba(255,255,255,.24); }
.tb-player.show{display:flex;}
.tb-avatar{width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-b));
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:900;color:white;flex-shrink:0;}
.tb-pname{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;
  color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-edit{font-size:.6rem;opacity:.6;margin-left:1px;flex-shrink:0;}

/* ── SHARE MODAL ────────────────────────────────────────── */
.share-preview-box{
  background:#f8f9ff;border:1.5px solid var(--border);border-radius:16px;
  padding:18px 16px;margin-bottom:4px;
  font-family:'Courier New',Courier,monospace;font-size:.9rem;
  color:var(--txt);line-height:2;white-space:pre;text-align:center;
  letter-spacing:.3px;word-break:break-all;
}

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:390px){
  .tile{width:50px;height:50px;font-size:1.55rem;border-radius:9px;}
  .key{height:46px;min-width:28px;font-size:.76rem;} .key.wide{min-width:46px;}
  .g-title h1{font-size:2.4rem;} .tb-brand{font-size:.82rem;} .tb-tag{font-size:.5rem;}
}
@media(max-height:680px){
  .game-wrap{gap:8px;} .tile{width:50px;height:50px;font-size:1.5rem;}
  .g-title h1{font-size:2.3rem;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="tb-left">
    <div class="tb-cap">🎓</div>
    <div class="tb-brand">MY Edu Hub<span class="tb-tag">Where Learn Meet Success</span></div>
  </div>
  <div class="tb-right">
    <!-- Player name chip — click to rename -->
    <div class="tb-player" id="tbPlayer" title="Click to change name">
      <div class="tb-avatar" id="tbAvatar">?</div>
      <div class="tb-pname"  id="tbPname"></div>
      <span class="tb-edit">✏️</span>
    </div>
    <button class="tb-btn" id="statsBtnH" title="Stats">📊</button>
    <button class="tb-btn" id="helpBtnH"  title="Help">❓</button>
  </div>
</header>

<div class="toast-wrap" id="toastWrap"></div>

<!-- NAME ENTRY — shown once on first visit -->
<div class="name-overlay" id="nameOverlay">
  <div class="name-card">
    <div class="name-hero">
      <span class="name-cap">🎓</span>
      <div class="name-brand">MY Edu Hub</div>
      <div class="name-tagline">Where Learn Meet Success</div>
    </div>
    <div class="name-body">
      <div class="name-welcome" id="nmWelcome">Welcome to TEKAWORD!</div>
      <div class="name-hint"    id="nmHint">What's your name? It'll appear in your results.</div>
      <div class="name-input-wrap">
        <span class="name-input-icon">👤</span>
        <input class="name-input" id="nameInput" type="text"
               maxlength="20" autocomplete="off" autocorrect="off"
               autocapitalize="words" spellcheck="false"
               placeholder="e.g. Ahmad, Sarah…">
      </div>
      <span class="name-err" id="nameErr"></span>
      <!-- onclick as direct backup in case addEventListener fails -->
      <button class="name-btn" id="nameSubmit" onclick="submitName()">Let's Play! 🚀</button>
      <div class="name-footer" id="nmFooter">Stored on your device only.</div>
    </div>
  </div>
</div>

<!-- RENAME MODAL — opened by clicking name chip -->
<div class="modal-overlay" id="renameModal">
  <div class="modal-box" style="max-width:340px;">
    <div class="m-hdr">
      <div class="m-title" id="renameTtl">✏️ Change Name</div>
      <button class="m-close" id="renameX">✕</button>
    </div>
    <div class="m-body">
      <div style="font-size:.8rem;color:var(--txt-m);margin-bottom:14px;" id="renameHint">Enter your new name.</div>
      <div class="name-input-wrap">
        <span class="name-input-icon">👤</span>
        <input class="name-input" id="renameInput" type="text"
               maxlength="20" autocomplete="off" autocorrect="off"
               autocapitalize="words" spellcheck="false">
      </div>
      <span class="name-err" id="renameErr"></span>
      <div class="m-btn-row" style="margin-top:12px;">
        <button class="m-btn primary" id="renameSave" onclick="saveName()"></button>
        <button class="m-btn" style="background:#f0f2ff;color:var(--txt);" id="renameCancel"></button>
      </div>
    </div>
  </div>
</div>

<!-- GAME -->
<main class="game-wrap">
  <div class="g-title">
    <h1>TEKAWORD</h1>
    <div class="sub" id="gameSub"></div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="sP">0</div><div class="stat-lbl" id="sPl"></div></div>
    <div class="stat"><div class="stat-val" id="sW">0%</div><div class="stat-lbl" id="sWl"></div></div>
    <div class="stat"><div class="stat-val" id="sSt">0</div><div class="stat-lbl" id="sStl"></div></div>
    <div class="stat"><div class="stat-val" id="sBe">0</div><div class="stat-lbl" id="sBel"></div></div>
  </div>

  <div class="lang-toggle">
    <button class="lang-btn active" id="btnEn">🇬🇧 English</button>
    <button class="lang-btn"        id="btnMs">🇲🇾 Melayu</button>
  </div>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnChallenge"></button>
    <button class="mode-btn"        id="btnPractice"></button>
  </div>

  <div class="grid" id="grid"></div>

  <!-- Achievement card — shown when challenge already completed today -->
  <div id="achCard" style="display:none" class="ach-card">
    <div class="ach-done"  id="achDone"></div>
    <div class="ach-sub"   id="achSub"></div>
    <div class="ach-grid"  id="achGrid"></div>
    <div class="ach-score" id="achScore"></div>
    <div class="ach-personal" id="achPersonal"></div>
    <button class="btn-practice" onclick="switchMode('practice')" id="achPracticeBtn"></button>
  </div>

  <div class="legend" id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--corr)"></div><span id="legC"></span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--pres)"></div><span id="legP"></span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--abs)"></div> <span id="legA"></span></div>
  </div>

  <div class="keyboard" id="keyboard"></div>

  <div class="btn-row" id="btnRow">
    <button class="btn-gold"  id="newGameBtn"></button>
    <button class="btn-ghost" id="helpBtn"></button>
  </div>

  <!-- Cooldown banner — appears after game while timer active -->
  <div class="cd-banner" id="cdBanner">
    <div class="cd-emoji">⏳</div>
    <div class="cd-title" id="cdTitle"></div>
    <div class="cd-timer" id="cdTimer">1:00:00</div>
    <div class="cd-sub"   id="cdSub"></div>
  </div>

  <!-- Share button — appears after game ends -->
  <div id="shareRow">
    <button class="btn-share" id="shareBtn"></button>
  </div>

  <div class="footer" id="footerTxt"></div>
</main>

<!-- HOW TO PLAY -->
<div class="modal-overlay" id="howModal">
  <div class="modal-box">
    <div class="m-hdr"><div class="m-title" id="howTtl"></div><button class="m-close" id="howX">✕</button></div>
    <div class="m-body">
      <div class="how-desc" id="howIntro"></div>
      <hr class="how-div">
      <div class="how-row" id="howRow1"></div>
      <div class="how-rule">
        <div class="how-rule-dot" style="background:var(--corr)"></div>
        <div class="how-rule-text" id="howG"></div>
      </div>
      <div class="how-row" id="howRow2"></div>
      <div class="how-rule">
        <div class="how-rule-dot" style="background:var(--pres)"></div>
        <div class="how-rule-text" id="howY"></div>
      </div>
      <div class="how-row" id="howRow3"></div>
      <div class="how-rule">
        <div class="how-rule-dot" style="background:var(--abs)"></div>
        <div class="how-rule-text" id="howGr"></div>
      </div>
      <div class="m-btn-row"><button class="m-btn primary" id="howOk"></button></div>
    </div>
  </div>
</div>

<!-- STATS MODAL -->
<div class="modal-overlay" id="statsModal">
  <div class="modal-box">
    <div class="m-hdr"><div class="m-title" id="statsTtl"></div><button class="m-close" id="statsX">✕</button></div>
    <div class="m-body">

      <!-- Lang tabs (EN / BM) -->
      <div class="st-tabs">
        <button class="st-tab active" id="stEn">🇬🇧 English</button>
        <button class="st-tab"        id="stMs">🇲🇾 Melayu</button>
      </div>

      <!-- Mode toggle inside stats (Challenge / Practice) -->
      <div class="st-mode-tabs">
        <button class="st-mode-btn active" id="stModeChallenge"></button>
        <button class="st-mode-btn"        id="stModePractice"></button>
      </div>

      <!-- Single stats block — content swaps per active mode+lang -->
      <div class="sm-stats">
        <div class="sm-s"><div class="sm-v" id="smStP">0</div> <div class="sm-l" id="smStPl"></div></div>
        <div class="sm-s"><div class="sm-v" id="smStW">0%</div><div class="sm-l" id="smStWl"></div></div>
        <div class="sm-s"><div class="sm-v" id="smStS">0</div> <div class="sm-l" id="smStSl"></div></div>
        <div class="sm-s"><div class="sm-v" id="smStB">0</div> <div class="sm-l" id="smStBl"></div></div>
      </div>

      <!-- Distribution -->
      <div class="dist-ttl" id="distStTtl"></div>
      <div id="distStBox"></div>

      <!-- Last game for active mode+lang -->
      <div id="lgCard" style="display:none" class="lg-card">
        <div class="lg-lbl"  id="lgLbl"></div>
        <div class="lg-res"  id="lgRes"></div>
        <div class="lg-ans"  id="lgAns"></div>
        <div class="emoji-prev" id="emojiPrev" style="display:none"></div>
      </div>

      <div class="m-btn-row">
        <button class="m-btn gold"    id="shareInStats"></button>
        <button class="m-btn primary" id="statsOk"></button>
      </div>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal-overlay" id="shareModal">
  <div class="modal-box">
    <div class="m-hdr">
      <div class="m-title" id="shareMTtl">📤 Share Result</div>
      <button class="m-close" id="shareMX">✕</button>
    </div>
    <div class="m-body">
      <!-- Image preview (small, no scroll needed) -->
      <div class="share-img-wrap">
        <canvas id="shareCanvas" width="800" height="800"></canvas>
      </div>

      <!-- Two buttons side-by-side -->
      <div class="share-btn-row">
        <button class="m-btn gold"    id="shareImgBtn">📷</button>
        <button class="m-btn primary" id="shareTxtBtn">💬</button>
      </div>
    </div>
  </div>
</div>

/* Single global cooldown key — Practice mode only */
function cdKey(){return "tw_cd_practice";}
function setCooldown(){
  if(mode==="practice") localStorage.setItem(cdKey(),Date.now());
}
function getRemainingMs(){
  if(mode!=="practice") return 0; // Challenge has no cooldown
  const ts=+localStorage.getItem(cdKey())||0;
  if(!ts)return 0;
  return Math.max(0,COOLDOWN-(Date.now()-ts));
}

/* Challenge — played today check */
function challengeKey(){return `tw_challenge_${lang}_${mytDate()}`;}
function hasPlayedChallenge(){return !!localStorage.getItem(challengeKey());}
function markChallengePlayedToday(){
  const won  = guesses.length>0&&guesses[guesses.length-1]===answer;
  const score= won?guesses.length:"X";
  localStorage.setItem(challengeKey(), JSON.stringify({
    won, score,
    guesses: guesses.length,
    emojiGrid: buildEmojiGrid(),
    name: getPlayerName()
  }));
}
function getChallengeResult(){
  try{ return JSON.parse(localStorage.getItem(challengeKey())||"null"); }
  catch{ return null; }
}

/* ── Game state persistence (Challenge only) ─────────── */
function stateKey(){ return `tw_state_ch_${lang}_${mytDate()}`; }

function saveGameState(){
  if(mode!=="challenge")return;
  try{
    localStorage.setItem(stateKey(), JSON.stringify({
      guesses, results, answer, keyState,
      gameOver, buf: gameOver?"":buf
    }));
    // Also remember which lang the challenge was in
    localStorage.setItem("tw_last_ch_lang", lang);
  }catch{}
}

function loadGameState(){
  try{
    const s=JSON.parse(localStorage.getItem(stateKey())||"null");
    if(!s||!s.answer||s.answer.length!==5) return false;
    guesses  = s.guesses  ||[];
    results  = s.results  ||[];
    answer   = s.answer;
    keyState = s.keyState ||{};
    gameOver = s.gameOver ||false;
    buf      = s.buf      ||"";
    return true;
  }catch{ return false; }
}

function clearGameState(){
  try{ localStorage.removeItem(stateKey()); }catch{}
}
function fmtMs(ms){
  const totalSec=Math.ceil(ms/1000);
  const h=Math.floor(totalSec/3600);
  const m=Math.floor((totalSec%3600)/60);
  const s=totalSec%60;
  if(h>0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${m}:${String(s).padStart(2,"0")}`;
}

function startCooldownTimer(){
  stopCooldownTimer();
  updateCooldownUI();
  cdInterval=setInterval(updateCooldownUI,1000);
}
function stopCooldownTimer(){
  if(cdInterval){clearInterval(cdInterval);cdInterval=null;}
}

function updateCooldownUI(){
  const rem=getRemainingMs();
  const btn=document.getElementById("newGameBtn");
  const banner=document.getElementById("cdBanner");

  if(rem>0){
    btn.disabled=true;
    btn.textContent=`⏳ ${fmtMs(rem)}`;
    document.getElementById("cdTimer").textContent=fmtMs(rem);
    banner.classList.add("show");
  }else{
    stopCooldownTimer();
    btn.disabled=false;
    btn.textContent=t("btnNew");
    banner.classList.remove("show");
  }
}

function checkCooldown(){
  if(getRemainingMs()>0) startCooldownTimer();
  else updateCooldownUI();
}

function recordResult(won){
  // Save to mode-specific key: tw_ch_en / tw_ch_ms / tw_pr_en / tw_pr_ms
  const sk = mode==="challenge" ? `tw_ch_${lang}` : `tw_pr_${lang}`;
  try{

    s.played=(s.played||0)+1;
    if(won){
      s.wins=(s.wins||0)+1;s.streak=(s.streak||0)+1;s.best=Math.max(s.best||0,s.streak);
      if(!s.dist||s.dist.length!==6)s.dist=Array(6).fill(0);
      s.dist[Math.min(guesses.length-1,5)]++;
    }else s.streak=0;
    s.lastGame={won,guesses:guesses.length,answer,emojiGrid:buildEmojiGrid()};
    localStorage.setItem(sk,JSON.stringify(s));
  }catch{}

  if(mode==="challenge") markChallengePlayedToday();
  refreshMini();

/* Build a distribution histogram HTML */
function buildDistHtml(s, dl, isCurrent){
  if(!s.played) return `<div class="no-game">${dl.noG||'No games yet!'}</div>`;
  const mx=Math.max(...s.dist,1), lg=s.lastGame;
  let h="";
  s.dist.forEach((c,i)=>{
    const pct=Math.max(Math.round(c/mx*100),c>0?8:0);
    const isCur=isCurrent&&lg&&lg.won&&lg.guesses===(i+1);
    const isL  =isCurrent&&lg&&!lg.won&&(i+1)===MAX&&c>0;
    const cls  =isCur?"bc":isL?"bl":c>0?"bw":"";
    h+=`<div class="dist-row"><div class="dist-n">${i+1}</div>
      <div class="dist-track"><div class="dist-bar ${cls}" style="width:${pct}%">
        <span class="dist-ct">${c}</span></div></div></div>`;
  });
  return h;
}

  }catch{return{played:0,wins:0,streak:0,best:0,dist:Array(6).fill(0),lastGame:null};}
}

function buildEmojiGrid(){
  return results.map(r=>
    r.map(v=>v==="correct"?"🟦":v==="present"?"🟧":"⬛").join("")
  ).join("\n");
}

/* Build share text for specific lang+mode — used by stats share button */
function buildShareTextFor(l, m){
  const dl  = T[l];
  const url = dl.shareUrl||"tekaword.bijak.live";
  const name= getPlayerName();
  let won, score, n, grid;

  // Helper: get saved emoji grid — separate key (most reliable) or inline fallback
  const getSavedGrid = ()=>{
    // 1. Separate emoji key (saved at game end)
    const sep = localStorage.getItem(`tw_emoji_${m}_${l}`)||"";
    if(sep) return sep;
    // 2. Live results (if this is the current game still in memory)
    if(l===lang && m===mode && gameOver && results.length) return buildEmojiGrid();
    return "";
  };

  if(m==="challenge"){
    const achR = getChResultFor(l);
    if(achR){
      won=achR.won; score=achR.score; n=achR.guesses;
      grid=achR.emojiGrid||getSavedGrid();
    }else if(l===lang&&gameOver&&results.length){
      won=guesses[guesses.length-1]===answer;
      score=won?guesses.length:"X"; n=guesses.length; grid=buildEmojiGrid();
    }else return null;
  }else{
    const pr=getModeStats("practice",l);
    const lg=pr.lastGame;
    if(!lg) return null;
    won=lg.won; score=won?lg.guesses:"X"; n=lg.guesses;
    grid=lg.emojiGrid||getSavedGrid();
  }

  const modeLbl = m==="challenge"
    ? dl.shareChallenge(dayNumber())
    : dl.sharePractice;

  const personal = won
    ? dl.sharePersonWon(name,n)
    : dl.sharePersonLost(name);

  // Build highlight line — streak ≥3 and/or win% ≥90%
  const mStats  = getModeStats(m, l);
  const streak  = mStats.streak || 0;
  const winPct  = mStats.played ? Math.round(mStats.wins / mStats.played * 100) : 0;
  const parts   = [];
  if(streak  >= 3)   parts.push(`🔥 ${l==="ms"?"Berturut":"Streak"}: ${streak}`);
  if(winPct  >= 90)  parts.push(`💯 ${l==="ms"?"Menang":"Win"}: ${winPct}%`);
  const highlights = parts.length ? `\n${parts.join("  |  ")}` : "";

  return `TEKAWORD 🎓 MY Edu Hub\n${modeLbl} ${score}/${MAX} (${dl.shareLabel})\n\n${grid}${highlights}\n\n${personal}\n${url}`;
}

/* Build share text for current game */

  if(!results.length&&!gameOver&&!achResult) return null;
  return buildShareTextFor(lang,mode);
}

const SHARE_GRADIENTS = [
  ["#0D47A1","#E65100"], ["#1B5E20","#0D47A1"], ["#4A148C","#FF6F00"],

];
const SHARE_EMOJIS = ["🎯","🔥","✨","💡","🧠","🏆","⭐","🎓","💪","👀","🚀","💯","⚡"];
const SHARE_SENTENCES = {
  en:{
    won:[n=>`Crushed it in ${n}!`,n=>`Nailed it in just ${n}!`,n=>`Solved in ${n} — big brain!`,
         n=>`Got it in ${n}!`,n=>`${n} tries. Easy!`,n=>`Boom! ${n}/6 done!`],

  }

function _rand(a){return a[Math.floor(Math.random()*a.length)];}

/* Generate share image on canvas — uses live results or saved emojiGrid */
function generateShareImage(l, m){
  const canvas = document.getElementById("shareCanvas");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const W=canvas.width, H=canvas.height;

  // Resolve game data (same logic as buildShareTextFor)
  let won, score, n, gridStr, name=getPlayerName()||"Player";
  if(m==="challenge"){
    const achR=getChResultFor(l);
    if(achR){ won=achR.won; score=achR.score; n=achR.guesses; gridStr=achR.emojiGrid; }
    else if(l===lang&&gameOver&&results.length){
      won=guesses[guesses.length-1]===answer;
      score=won?guesses.length:"X"; n=guesses.length; gridStr=buildEmojiGrid();
    }else return;
  }else{
    const lg=getModeStats("practice",l).lastGame;
    if(!lg) return;
    won=lg.won; score=won?lg.guesses:"X"; n=lg.guesses;
    gridStr=lg.emojiGrid||localStorage.getItem(`tw_emoji_${m}_${l}`)||"";
  }
  if(!gridStr) gridStr="🟦🟦🟦🟦🟦";
  const tileRows = gridStr.split("\n").map(row=>{
    const cells=[...row]; // emoji-aware split
    return cells.map(c=>c==="🟦"?"correct":c==="🟧"?"present":"absent");
  });

  // 1. Random gradient background
  const [c1,c2]=_rand(SHARE_GRADIENTS);
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,c1); grad.addColorStop(1,c2);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // 2. Emoji scatter
  ctx.globalAlpha=0.18;
  for(let i=0;i<18;i++){
    const e=_rand(SHARE_EMOJIS);
    const x=Math.random()*W, y=Math.random()*H;
    const size=40+Math.random()*55;
    ctx.font=`${size}px sans-serif`;
    ctx.fillText(e,x,y);
  }
  ctx.globalAlpha=1;

  // 3. Branding
  ctx.fillStyle="rgba(255,255,255,.95)";
  ctx.font="900 56px Poppins,sans-serif";
  ctx.textAlign="center";
  ctx.fillText("🎓 TEKAWORD",W/2,100);
  ctx.fillStyle="rgba(255,255,255,.65)";
  ctx.font="700 22px Nunito,sans-serif";
  ctx.fillText("MY Edu Hub",W/2,134);

  // 4. Mode label
  const modeLbl = m==="challenge"
    ? (l==="ms"?`🏆 Cabaran #${dayNumber()}`:`🏆 Challenge #${dayNumber()}`)
    : (l==="ms"?"🎯 Latihan":"🎯 Practice");
  ctx.fillStyle="rgba(255,255,255,.9)";
  ctx.font="800 28px Nunito,sans-serif";
  ctx.fillText(modeLbl,W/2,184);

  // 5. Tiles (HERO) — size scales with row count so 6 rows still fit comfortably
  const rowCount = tileRows.length;
  const tSize = rowCount <= 3 ? 90 : rowCount <= 4 ? 80 : rowCount <= 5 ? 72 : 64;
  const tGap = rowCount <= 4 ? 10 : 8;
  const rGap = rowCount <= 4 ? 10 : 8;
  const gridW = tSize*5+tGap*4;
  const sx=(W-gridW)/2, sy=240;
  ctx.shadowColor="rgba(0,0,0,.3)"; ctx.shadowBlur=8; ctx.shadowOffsetY=4;
  for(let r=0;r<tileRows.length;r++){
    for(let c=0;c<5;c++){
      const x=sx+c*(tSize+tGap), y=sy+r*(tSize+rGap);
      const v=tileRows[r][c];
      ctx.fillStyle = v==="correct"?"#1565C0":v==="present"?"#E65100":"#37474F";
      _roundRect(ctx,x,y,tSize,tSize,Math.round(tSize*0.16)); ctx.fill();
    }
  }
  ctx.shadowColor="transparent"; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  // 6. Trophy + score badge
  const scoreY = sy + tileRows.length*(tSize+rGap) + 50;
  ctx.fillStyle = won?"rgba(232,184,75,.95)":"rgba(229,57,53,.9)";
  ctx.beginPath(); ctx.arc(W/2,scoreY+40,55,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="white";
  ctx.font="900 42px Poppins,sans-serif";
  ctx.fillText(won?"🏆":"💪",W/2-45,scoreY+55);
  ctx.font="900 40px Poppins,sans-serif";
  ctx.fillText(`${score}/${MAX}`,W/2+30,scoreY+55);

  // 7. Personalized sentence (random)
  const sList = SHARE_SENTENCES[l][won?"won":"lost"];
  const personal = won ? _rand(sList)(n) : _rand(sList);
  ctx.fillStyle="rgba(255,255,255,.95)";
  ctx.font="italic 800 28px Nunito,sans-serif";
  // Truncate name if too long for layout
  const nm = name.length>15?name.slice(0,15)+"…":name;
  ctx.fillText(`${nm} — ${personal}`,W/2,scoreY+135);

  // 8. URL
  ctx.fillStyle="rgba(255,255,255,.7)";
  ctx.font="800 24px Nunito,sans-serif";
  ctx.fillText("tekaword.bijak.live",W/2,H-40);
}

function _roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

   CORE LOGIC

function evaluate(guess,ans){
  const res=Array(WLEN).fill("absent"),a=ans.split("");
  for(let i=0;i<WLEN;i++)if(guess[i]===a[i]){res[i]="correct";a[i]=null;}
  for(let i=0;i<WLEN;i++){if(res[i]==="correct")continue;
    const x=a.indexOf(guess[i]);if(x!==-1){res[i]="present";a[x]=null;}}
  return res;
}
function updateKeys(guess,res){
  const p={correct:3,present:2,absent:1};
  for(let i=0;i<WLEN;i++){const l=guess[i],s=res[i];
    if(!keyState[l]||p[s]>p[keyState[l]])keyState[l]=s;}
}

function renderGrid(){
  const g=document.getElementById("grid");g.innerHTML="";
  for(let row=0;row<MAX;row++){
    const rd=document.createElement("div");rd.className="row";rd.id=`r${row}`;
    const gs=row<guesses.length?guesses[row]:null;
    const rs=row<results.length?results[row]:null;
    for(let col=0;col<WLEN;col++){
      const tile=document.createElement("div");tile.className="tile";tile.id=`t${row}${col}`;
      if(gs){
        tile.textContent=gs[col].toUpperCase();tile.classList.add("filled");
        if(rs[col]==="correct")tile.classList.add("correct");
        else if(rs[col]==="present")tile.classList.add("present");
        else tile.classList.add("absent");
      }else if(row===guesses.length&&!gameOver&&!isLoading&&col<buf.length){
        tile.textContent=buf[col].toUpperCase();tile.classList.add("filled");
      }
      rd.appendChild(tile);
    }
    g.appendChild(rd);
  }
}

const KBR=[["q","w","e","r","t","y","u","i","o","p"],
           ["a","s","d","f","g","h","j","k","l"],
           ["enter","z","x","c","v","b","n","m","del"]];

function buildKeyboard(){
  const kb=document.getElementById("keyboard");kb.innerHTML="";
  for(const row of KBR){
    const rd=document.createElement("div");rd.className="key-row";
    for(const k of row){
      const btn=document.createElement("button");
      btn.id=`k-${k}`;btn.className="key"+(k==="enter"||k==="del"?" wide":"");
      btn.textContent=k==="enter"?"⏎":k==="del"?"⌫":k.toUpperCase();
      btn.addEventListener("click",()=>onKey(k));
      rd.appendChild(btn);
    }
    kb.appendChild(rd);
  }
  paintKeys();
}
/* paintKeys — updates web keyboard colour state after each guess */
function paintKeys(){
  for(const row of KBR)for(const k of row){
    if(k==="enter"||k==="del")continue;
    const btn=document.getElementById(`k-${k}`);if(!btn)continue;
    btn.classList.remove("correct","present","absent");
    if(keyState[k])btn.classList.add(keyState[k]);
  }
}

        t.style.transform="rotateX(-90deg) scale(.85)";
        setTimeout(()=>{
          const t2=document.getElementById(`t${rowIdx}${c}`);if(!t2)return;
          if(res[c]==="correct")t2.classList.add("correct");
          else if(res[c]==="present")t2.classList.add("present");
          else t2.classList.add("absent");
          t2.style.transform="rotateX(0) scale(1)";
        },230);
      },c*130);
    })(col);
  }
  setTimeout(()=>{isAnimating=false;if(onDone)onDone();},(WLEN-1)*130+470);
}

function animBounce(rowIdx){
  setTimeout(()=>{
    for(let col=0;col<WLEN;col++){
      (function(c){setTimeout(()=>{
        const t=document.getElementById(`t${rowIdx}${c}`);if(!t)return;
        t.classList.add("bounce");setTimeout(()=>t.classList.remove("bounce"),500);
      },c*70);})(col);
    }
  },120);
}

function shakeRow(rowIdx){
  const r=document.getElementById(`r${rowIdx}`);
  if(r){r.classList.add("shake");setTimeout(()=>r.classList.remove("shake"),400);}
}

/* ═══════════════════════════════════════════════════════
   SUBMIT
   buf cleared BEFORE renderGrid inside submitGuess
   → next active row always empty
═══════════════════════════════════════════════════════ */
async function submitGuess(guess){
  if(gameOver)  {toast(t("tGO"),"err");return false;}
  if(isLoading) {toast(t("tWait"),"err");return false;}
  if(isChecking){toast(t("tChk"),"err");return false;}
  if(!answer)   {toast(t("tWait"),"err");return false;} // answer not loaded yet
  if(guesses.length>=MAX){toast(t("tNoMore"),"err");return false;}
  if(guess.length!==WLEN){toast(t("tNeed5"),"err");return false;}
  if(!/^[a-z]{5}$/.test(guess)){toast(t("tAlpha"),"err");return false;}
  if(guesses.includes(guess)){toast(t("tTried"),"err");return false;}

  isChecking=true;
  const chk=toast(`${t("tChecking")} <strong>${guess.toUpperCase()}</strong>…<span class="spin"></span>`,"",0);
  const valid=lang==="en"?await isValidEn(guess):await isValidMs(guess);
  chk.remove();isChecking=false;

  if(!valid){
    toast(`"${guess.toUpperCase()}" ${t("tInvalid")}`,"err");
    shakeRow(guesses.length);return false;
  }

  // Accept
  const rowIdx=guesses.length;
  guesses.push(guess);
  const res=evaluate(guess,answer);
  results.push(res);
  updateKeys(guess,res);

  // Save state after every guess (Challenge only — survives page reload)
  saveGameState();

  // Clear buf BEFORE renderGrid → next row is empty
  buf="";
  renderGrid();
  paintKeys();

  const won =guess===answer;
  const lost=!won&&guesses.length===MAX;

  animReveal(rowIdx,res,()=>{
    if(won){
      gameOver=true;animBounce(rowIdx);
      toast(t("winMsgs")[guesses.length-1]||t("tWon"),"ok",7000);
      recordResult(true);
      saveGameState(); // save final state (gameOver=true)
      showPostGame();
      setTimeout(()=>openStats(),1800);
    }else if(lost){
      gameOver=true;
      toast(`${t("tLost")} <strong>${answer.toUpperCase()}</strong>`,"err",9000);
      recordResult(false);
      saveGameState(); // save final state (gameOver=true)
      showPostGame();
      setTimeout(()=>openStats(),2200);
    }else{
      toast(t("tValid"),"",2000);
    }
  });
  return true;
}

/* Show achievement card after challenge completed / already played */
function showChallengeAchievement(){
  const result = getChallengeResult();
  if(!result) return;

  const won   = result.won;
  const score = result.score;
  const n     = result.guesses;
  const name  = getPlayerName();

  // Hide grid and keyboard — show achievement card instead
  document.getElementById("grid").style.display    = "none";
  document.getElementById("keyboard").style.display= "none";
  document.getElementById("btnRow").style.display  = "none";
  document.getElementById("legend").style.display  = "none";

  // Populate achievement card
  document.getElementById("achDone").textContent     = t("achDone");
  document.getElementById("achSub").textContent      = t("achSub");
  document.getElementById("achGrid").innerHTML       = result.emojiGrid.replace(/\n/g,"<br>");
  document.getElementById("achScore").textContent    = `${score}/${MAX}`;
  document.getElementById("achPersonal").textContent = won
    ? t("sharePersonWon")(name, n)
    : t("sharePersonLost")(name);
  document.getElementById("achPracticeBtn").textContent = t("achTryPractice");
  document.getElementById("achCard").style.display   = "";

  // Show share button
  document.getElementById("shareRow").classList.add("show");
}

/* Restore normal view (Practice mode / new challenge) */
function hideChallengeAchievement(){
  document.getElementById("grid").style.display    = "";
  document.getElementById("keyboard").style.display= "";
  document.getElementById("btnRow").style.display  = "";
  document.getElementById("legend").style.display  = "";
  document.getElementById("achCard").style.display = "none";
  document.getElementById("shareRow").classList.remove("show");
}

function showPostGame(){
  // Save emoji grid separately — reliable cross-session retrieval
  const emojiKey = `tw_emoji_${mode}_${lang}`;
  try{ localStorage.setItem(emojiKey, buildEmojiGrid()); }catch{}

  if(mode==="challenge"){
    markChallengePlayedToday();
    // Capture lang NOW — so timeout always shows the right lang's achievement
    const capturedLang = lang;
    pendingAchTimeout = setTimeout(()=>{
      pendingAchTimeout = null;
      // Only show if lang hasn't changed since game ended
      if(lang === capturedLang) showChallengeAchievement();
    }, 800);
  }else{
    document.getElementById("shareRow").classList.add("show");
  }
}

function cancelPendingAch(){
  if(pendingAchTimeout){ clearTimeout(pendingAchTimeout); pendingAchTimeout=null; }
}

/* ═══════════════════════════════════════════════════════
   KEY HANDLING
═══════════════════════════════════════════════════════ */
async function onKey(k){
  if(gameOver||isLoading||isChecking||isAnimating)return;
  if(k==="enter"){
    if(buf.length===WLEN){
      const ok=await submitGuess(buf);
      if(!ok) renderGrid();
    }else{toast(t("tNeed5"),"err");shakeRow(guesses.length);}
  }else if(k==="del"){
    if(buf.length>0){buf=buf.slice(0,-1);renderGrid();}
  }else{
    if(buf.length<WLEN){buf+=k;renderGrid();}
  }
}

/* Physical keyboard support (desktop) */
function onPhysKey(e){
  if(gameOver||isLoading||isChecking||isAnimating)return;
  if(e.key==="Enter"){e.preventDefault();onKey("enter");}
  else if(e.key==="Backspace"){e.preventDefault();onKey("del");}
  else if(/^[a-zA-Z]$/.test(e.key)){e.preventDefault();onKey(e.key.toLowerCase());}
}

/* paintColorStrip is not used — unified keyboard for all devices */

/* ═══════════════════════════════════════════════════════
   FETCH ANSWER
   Challenge → Firebase daily word → seeded fallback
   Practice  → random from local pool
═══════════════════════════════════════════════════════ */
async function fetchAnswer(){
  isLoading=true;
  const el=toast(`${t("tDailyLoad")}<span class="spin"></span>`,"",0);
  try{
    let w=null;

    if(mode==="challenge"){
      // 1. Try Firebase
      w=await fetchDailyWord(lang);
      if(!w){
        // 2. Seeded fallback
        toast(t("tNoWordSet"),"",3000);
        w=lang==="en"
          ? seededWord(EN_FB)
          : seededWord(MS_WORDS);
      }
    }else{
      // Practice — random local word
      w=lang==="en"
        ? getEnAnswer()
        : MS_WORDS[Math.floor(Math.random()*MS_WORDS.length)];
    }

    // Safety check
    if(!w||w.length!==5||!/^[a-z]{5}$/.test(w)){
      w=lang==="en"?EN_FB[0]:MS_WORDS[0];
    }
    answer=w;
    el.remove();
    const msg=mode==="challenge"?t("tDailyReady"):t("tPracticeReady");
    setTimeout(()=>toast(msg,"ok"),80);

  }catch(e){
    el.remove();toast("❌ Error. Try again.","err",6000);gameOver=true;
  }
  isLoading=false;
}

/* ═══════════════════════════════════════════════════════
   GAME FLOW
═══════════════════════════════════════════════════════ */
async function resetGame(){
  cancelPendingAch();
  // Challenge — show achievement if already played today
  if(mode==="challenge"&&hasPlayedChallenge()){
    hideChallengeAchievement(); // reset first
    showChallengeAchievement(); // then show result
    return;
  }
  // Practice — no cooldown, always allowed
  stopCooldownTimer();
  gameOver=false;guesses=[];results=[];
  buf="";keyState={};isAnimating=false;answer="";
  clearToasts();
  document.getElementById("shareRow").classList.remove("show");
  document.getElementById("cdBanner").classList.remove("show");
  renderGrid();buildKeyboard();
  await fetchAnswer();
}

async function switchMode(m){
  cancelPendingAch();
  mode=m;
  updateNewGameBtn();
  document.getElementById("btnChallenge").classList.toggle("active",m==="challenge");
  document.getElementById("btnPractice").classList.toggle("active",m==="practice");
  document.getElementById("btnPractice").classList.toggle("practice",m==="practice");
  document.getElementById("gameSub").textContent=
    m==="challenge"?t("subChallenge"):t("subPractice");
  if(m==="challenge"){
    stopCooldownTimer();
    document.getElementById("cdBanner").classList.remove("show");
  }
  // Reset state
  gameOver=false;guesses=[];results=[];
  buf="";keyState={};isAnimating=false;answer="";
  clearToasts();
  hideChallengeAchievement(); // always restore grid view first

  // Challenge already played today → show achievement
  if(m==="challenge"&&hasPlayedChallenge()){
    renderGrid();buildKeyboard();
    showChallengeAchievement();
    return;
  }
  renderGrid();buildKeyboard();
  if(m==="practice") checkCooldown();
  if(getRemainingMs()===0) await fetchAnswer();
}

async function switchLang(l){
  cancelPendingAch();
  lang=l;
  document.getElementById("btnEn").classList.toggle("active",l==="en");
  document.getElementById("btnMs").classList.toggle("active",l==="ms");
  applyLang();updateNewGameBtn();refreshMini();

  gameOver=false;guesses=[];results=[];
  buf="";keyState={};isAnimating=false;answer="";
  clearToasts();
  document.getElementById("shareRow").classList.remove("show");

  // hideChallengeAchievement FIRST — restores grid/keyboard visibility
  // THEN renderGrid/buildKeyboard so they render while visible
  hideChallengeAchievement();
  renderGrid();buildKeyboard();

  if(mode==="challenge"&&hasPlayedChallenge()){
    showChallengeAchievement();
    return;
  }
  const rem=getRemainingMs();
  if(mode==="practice"&&rem>0){
    checkCooldown();
    toast(lang==="en"
      ?`⏳ Cooldown active. Wait ${fmtMs(rem)}.`
      :`⏳ Masa rehat aktif. Tunggu ${fmtMs(rem)}.`,"err",4000);
  }else{
    stopCooldownTimer();
    document.getElementById("cdBanner").classList.remove("show");
    await fetchAnswer();
  }
}

/* ═══════════════════════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════════════════════ */
const openModal =id=>document.getElementById(id).classList.add("open");
const closeModal=id=>document.getElementById(id).classList.remove("open");

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
window.addEventListener("load",async()=>{
  // ── 0. Init Firebase + preload word lists ────────────
  initFirebase();
  loadEnValid();
  loadBmValid();
  updateNewGameBtn(); // hide New Game in Challenge mode on load

  // ── Restore last challenge lang (fixes empty page on reload bug) ──
  const lastChLang = localStorage.getItem("tw_last_ch_lang");
  if(lastChLang && (lastChLang==="en"||lastChLang==="ms")){
    lang = lastChLang;
    document.getElementById("btnEn").classList.toggle("active",lang==="en");
    document.getElementById("btnMs").classList.toggle("active",lang==="ms");
  }

  // ── 1. Apply UI text & build components ──────────────
  applyLang();
  buildKeyboard();
  refreshMini();
  renderGrid();          // Show empty tiles immediately — don't wait for network

  // ── 2. Name entry ─────────────────────────────────────
  checkFirstVisit();
  document.getElementById("nameSubmit").addEventListener("click",submitName);

  // Rename modal — click name chip to open
  document.getElementById("tbPlayer").addEventListener("click",openRenameModal);
  document.getElementById("renameX").addEventListener("click",()=>closeModal("renameModal"));
  document.getElementById("renameCancel").addEventListener("click",()=>closeModal("renameModal"));
  document.getElementById("renameModal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal("renameModal");});
  document.getElementById("renameInput").addEventListener("keydown",e=>{
    e.stopPropagation();
    if(e.key==="Enter"){e.preventDefault();saveName();}
  });

  // ── 3. Wire ALL button events (before any async) ──────
  //    Buttons must respond even while fetchAnswer is running
  document.getElementById("newGameBtn").addEventListener("click",resetGame);
  document.getElementById("btnEn").addEventListener("click",()=>switchLang("en"));
  document.getElementById("btnMs").addEventListener("click",()=>switchLang("ms"));
  document.getElementById("btnChallenge").addEventListener("click",()=>switchMode("challenge"));
  document.getElementById("btnPractice").addEventListener("click",()=>switchMode("practice"));
  document.getElementById("shareBtn").addEventListener("click",openShareModal);

  // How-to
  const oh=()=>openModal("howModal");
  document.getElementById("helpBtn").addEventListener("click",oh);
  document.getElementById("helpBtnH").addEventListener("click",oh);
  document.getElementById("howX").addEventListener("click",()=>closeModal("howModal"));
  document.getElementById("howOk").addEventListener("click",()=>closeModal("howModal"));
  document.getElementById("howModal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal("howModal");});

  // Stats
  document.getElementById("statsBtnH").addEventListener("click",openStats);
  document.getElementById("statsX").addEventListener("click",()=>closeModal("statsModal"));
  document.getElementById("statsOk").addEventListener("click",()=>closeModal("statsModal"));
  document.getElementById("statsModal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal("statsModal");});
  document.getElementById("stEn").addEventListener("click",()=>buildStats("en",viewM));
  document.getElementById("stMs").addEventListener("click",()=>buildStats("ms",viewM));
  document.getElementById("stModeChallenge").addEventListener("click",()=>buildStats(viewL,"challenge"));
  document.getElementById("stModePractice").addEventListener("click",()=>buildStats(viewL,"practice"));
  document.getElementById("shareInStats").addEventListener("click",shareFromStats);

  // Share modal
  document.getElementById("shareMX").addEventListener("click",()=>closeModal("shareModal"));
  document.getElementById("shareImgBtn").addEventListener("click",shareAsImage);
  document.getElementById("shareTxtBtn").addEventListener("click",shareAsText);
  document.getElementById("shareModal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal("shareModal");});

  // ── 4. Input — always use custom keyboard; also support physical keys ──
  window.addEventListener("keydown", onPhysKey);

  // ── 5. Cooldown check then start game ─────────────────
  checkCooldown();
  // Set initial mode button labels
  document.getElementById("btnChallenge").textContent = t("modeChallenge");
  document.getElementById("btnPractice").textContent  = t("modePractice");

  if(mode==="challenge"&&hasPlayedChallenge()){
    // Case 1: Challenge already completed today → show achievement
    renderGrid();buildKeyboard();
    showChallengeAchievement();
  }else if(mode==="challenge"&&loadGameState()){
    // Case 2: Mid-game state restored → show grid with progress
    renderGrid();buildKeyboard();paintKeys();
    if(gameOver) showChallengeAchievement();
    // else: player can continue where they left off
  }else if(getRemainingMs()===0){
    // Case 3: Fresh game
    await resetGame();
  }else{
    document.getElementById("newGameBtn").textContent=t("btnNew");
  }
});
</script>
